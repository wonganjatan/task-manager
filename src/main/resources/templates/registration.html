<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <title>Registration</title>
</head>
<body>
    <div class="registration-page">
        <div class="registration-container">
            <h2>Registration</h2>
            <form th:action="@{/registration}" th:object="${registration}" method="post">
                <div class="form-group">
                    <label for="fname">First Name:</label>
                    <input type="text" id="fname" name="fname" th:field="*{firstName}" placeholder="First Name" required/>
                </div> 
                <div class="form-group">
                    <label for="lname">Last Name:</label>
                    <input type="text" id="lname" name="lname" th:field="*{lastName}" placeholder="Last Name" required/>
                </div> 
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="text" id="email" name="email" th:field="*{email}" placeholder="Email" required/>
                </div> 
                <div class="form-group">
                    <label for="username">Username:</label>
                    <input type="text" id="username" name="username" th:field="*{username}" placeholder="Username" required/>
                </div> 
                <div class="form-group">
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" th:field="*{password}" placeholder="Password" required/>
                </div> 
                <button type="submit">Register</button>
            </form>
        </div>
    </div>
</body>
</html>
