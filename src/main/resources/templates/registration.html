<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <title>Registration</title>
</head>
<body>
    <div class="registration-page">
        <div class="registration-container">
            <h2>Registration</h2>
            <form th:action="@{/registration}" th:object="${registrationForm}" method="post">
                <div class="form-group">
                    <label for="firstName">First Name:</label>
                    <input type="text" id="firstName" th:field="*{firstName}" placeholder="John" required/>
                    <p th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}">Error message</p>
                </div> 
                <div class="form-group">
                    <label for="lastName">Last Name:</label>
                    <input type="text" id="lastName" th:field="*{lastName}" placeholder="Doe" required/>
                    <p th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}">Error message</p>
                </div> 
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="text" id="email" th:field="*{email}" placeholder="example@email.com" required/>
                    <p th:if="${#fields.hasErrors('email')}" th:errors="*{email}">Error message</p>
                </div> 
                <div class="form-group">
                    <label for="username">Username:</label>
                    <input type="text" id="username" th:field="*{username}" required/>
                    <p th:if="${#fields.hasErrors('username')}" th:errors="*{username}">Error message</p>
                </div> 
                <div class="form-group">
                    <label for="password">Password:</label>
                    <input type="password" id="password" th:field="*{password}" minlength="8" required/>
                    <p th:if="${#fields.hasErrors('password')}" th:errors="*{password}">Error message</p>
                </div> 
                <button type="submit">Register</button>
            </form>

            <div th:if="${authError}" class="error-message">
                <p th:text="${authError}">Error Message</p>
            </div>
        </div>
    </div>
</body>
</html>
