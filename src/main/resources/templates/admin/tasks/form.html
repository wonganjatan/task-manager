<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <title th:text="${pageTitle}">Task Title</title>
</head>
<body>
    <div class="task-form-page">
        <div class="task-form-container">
            <div class="task-form-container-top">
                <h2 th:text="${pageTitle}">Task Header</h2>
                <form th:action="${taskId != null} ? @{/admin/tasks/{id}/edit(id=${taskId})} : @{/admin/tasks}"
                      th:object="${taskForm}" method="post" class="task-form">
                    <div class="form-group">
                        <label for="title">Title:</label>
                        <input type="text" id="title" th:field="*{title}" minlength="1" maxlength="20" required/>
                        <p th:if="${#fields.hasErrors('title')}" th:errors="*{title}">Error message</p>
                    </div>
                    <div class="form-group">
                        <label for="description">Description:</label>
                        <input type="text" id="description" th:field="*{description}" minlength="1" maxlength="40"/>
                        <p th:if="${#fields.hasErrors('description')}" th:errors="*{description}">Error message</p>
                    </div>
                    <div class="form-group">
                        <label for="priority">Priority:</label>
                        <select id="priority" th:field="*{priority}" required>
                            <option value="LOW">LOW</option>
                            <option value="MEDIUM">MEDIUM</option>
                            <option value="HIGH">HIGH</option>
                        </select>
                        <p th:if="${#fields.hasErrors('priority')}" th:errors="*{priority}">Error message</p>
                    </div>
                    <div class="form-group">
                        <label for="status">Status:</label>
                        <select id="status" th:field="*{status}" required>
                            <option value="TODO">TODO</option>
                            <option value="IN_PROGRESS">IN_PROGRESS</option>
                            <option value="DONE">DONE</option>
                        </select>
                        <p th:if="${#fields.hasErrors('status')}" th:errors="*{status}">Error message</p>
                    </div>
                    <div class="form-group">
                        <label for="dueDate">Due Date:</label>
                        <input type="datetime-local" id="dueDate" th:field="*{dueDate}" required/>
                        <p th:if="${#fields.hasErrors('dueDate')}" th:errors="*{dueDate}">Error message</p>
                    </div>
                    <div class="form-group">
                        <label for="assignedUserId">Assigned User:</label>
                        <select id="assignedUserId" th:field="*{assignedUserId}">
                            <option th:value="${null}">Unassigned</option>
                            <option th:each="user : ${users}" th:value="${user.id}" th:text="${user.firstName + ' ' + user.lastName}">User full name</option>
                        </select>
                        <p th:if="${#fields.hasErrors('assignedUserId')}" th:errors="*{assignedUserId}">Error message</p>
                    </div>

                    <button type="submit"><span th:text="${formSubmitButtonLabel}">Create/Edit Task</span></button>
                </form>
            </div>
            <div class="task-form-container-bottom">
                <a th:href="@{/admin/tasks}" id="back-link">Back</a>

            </div>
            <div th:if="${dateTimeError}" class="error-message">
                <p th:text="${dateTimeError}">Error Message</p>
            </div>
        </div>
    </div>
</body>
</html>
