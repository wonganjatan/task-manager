<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <title>Login</title>
</head>
<body>
    <div class="login-page">
        <div class="login-container">
            <h2>Login</h2>
            <form th:action="@{/login}" method="post" class="login-form">
<!--                <div class="form-group">-->
<!--                    <label for="username">Username:</label>-->
<!--                    <input type="text" id="username" name="username" required/>-->
<!--                </div>-->
<!--                <div class="form-group">-->
<!--                    <label for="password">Password:</label>-->
<!--                    <input type="password" id="password" name="password" required/>-->
<!--                </div>-->


<!--                Dummy login-->
                <div class="form-group">
                    <label for="username">Username:</label>
                    <input type="text" id="username" name="username" value="a" required/>
                </div>
                <div class="form-group">
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" value="Qwerty12!" required/>
                </div>
                <button type="submit">Login</button>
            </form>
            <p>Do not have an account? <a th:href="@{/registration}">Register</a></p>

            <div th:if="${authError}" class="error-message">
                <p th:text="${authError}">Error Message</p>
            </div>
        </div>
    </div>
</body>
</html>
