<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <title th:text="${task.title}">Task title</title>
</head>
<body>
<div class="view-task-page">
    <div class="view-task-card">
        <div class="task-content">
            <h3 th:text="${task.title}">Task title</h3>
            <p th:text="${task.description}">Task description</p>
            <p>Priority: <span th:text="${task.priority}">Task priority</span></p>
            <p>Status: <span th:text="${task.status}">Task status</span></p>
            <p>Due: <span th:text="${#temporals.format(task.dueDate, 'yyyy-MM-dd HH:mm')}">Task due date (yyyy-MM-dd HH:mm)</span></p>
            <p th:if="${task.assignedUser != null}">
                Assigned to:
                <span th:text="${task.assignedUser.firstName}">First name</span>
                <span th:text="${task.assignedUser.lastName}">Last name</span>
            </p>
            <p th:if="${task.assignedUser == null}">
                Assigned to: Unassigned
            </p>
        </div>
        <div class="task-buttons">
            <div class="task-buttons-left">
                <a th:href="@{/user/tasks}" id="back-link">Back</a>
            </div>
            <div class="task-buttons-right">

            </div>
        </div>
    </div>
</div>
</body>
</html>
